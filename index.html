<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Meta tags are populated by config.js via applyMeta() -->
  <meta name="description" id="metaDesc" content="">
  <meta name="author"      id="metaAuthor" content="">
  <meta property="og:title"       id="ogTitle" content="">
  <meta property="og:description" id="ogDesc"  content="">
  <meta property="og:type" content="website">
  <meta property="og:image" id="ogImage" content="">
  <title id="pageTitle"></title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js" defer></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --sw: 240px;
      --bg: #0a0a0f;
      --bg2: #111118;
      --bg3: #181824;
      --bgh: #1e1e2d;
      --tp: #f0f0f5;
      --ts: #9898b0;
      --tm: #55556a;
      --a1: #7c3aed;
      --a2: #0ea5e9;
      --a3: #f472b6;
      --border: rgba(255,255,255,0.07);
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
    }

    html { scroll-behavior: smooth; scrollbar-width: thin; scrollbar-color: var(--a1) var(--bg2); }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--a1); border-radius: 10px; }

    body {
      font-family: 'Geist', sans-serif;
      background: var(--bg);
      color: var(--tp);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ════════════════════════════════════
       SIDEBAR
    ════════════════════════════════════ */
    .sidebar {
      position: fixed;
      left: 0; top: 0;
      height: 100dvh;
      width: var(--sw);
      background: rgba(8, 8, 13, 0.97);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 28px 14px;
      z-index: 500;
      transition: transform 0.3s var(--ease);
    }

    .sidebar-brand {
      padding: 0 8px 26px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 22px;
    }

    .sidebar-logo {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(120deg, var(--tp) 30%, var(--a2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: block;
      line-height: 1;
      margin-bottom: 4px;
    }

    .sidebar-tagline {
      font-size: 10.5px;
      color: var(--tm);
      font-weight: 500;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    .sidebar-nav {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      color: var(--tm);
      text-decoration: none;
      font-size: 13.5px;
      font-weight: 500;
      transition: all 0.2s var(--ease);
      position: relative;
    }

    .nav-item i { font-size: 17px; flex-shrink: 0; }

    .nav-item:hover {
      background: rgba(255,255,255,0.04);
      color: var(--ts);
    }

    .nav-item.active {
      background: rgba(124, 58, 237, 0.1);
      color: var(--a1);
    }

    .nav-item.active::before {
      content: '';
      position: absolute;
      left: 0; top: 50%;
      transform: translateY(-50%);
      width: 3px; height: 55%;
      background: var(--a1);
      border-radius: 0 3px 3px 0;
    }

    .sidebar-footer {
      padding-top: 22px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 7px;
      justify-content: center;
    }

    .s-icon {
      width: 35px; height: 35px;
      border-radius: 9px;
      border: 1px solid var(--border);
      background: var(--bg3);
      display: flex; align-items: center; justify-content: center;
      color: var(--tm);
      text-decoration: none;
      font-size: 15px;
      transition: all 0.2s var(--ease);
    }

    .s-icon:hover {
      background: rgba(124, 58, 237, 0.12);
      border-color: rgba(124, 58, 237, 0.3);
      color: var(--a1);
      transform: translateY(-2px);
    }

    /* ════════════════════════════════════
       HAMBURGER
    ════════════════════════════════════ */
    .hamburger {
      display: none;
      position: fixed;
      top: 14px; left: 14px;
      z-index: 600;
      width: 40px; height: 40px;
      border: 1px solid var(--border);
      background: rgba(8, 8, 13, 0.95);
      backdrop-filter: blur(16px);
      border-radius: 10px;
      cursor: pointer;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .hamburger span {
      display: block;
      width: 16px; height: 1.5px;
      background: var(--ts);
      border-radius: 2px;
      transition: all 0.25s var(--ease);
      transform-origin: center;
    }

    .hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    /* ════════════════════════════════════
       OVERLAY
    ════════════════════════════════════ */
    .mob-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(3px);
      z-index: 400;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .mob-overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    /* ════════════════════════════════════
       MAIN CONTENT
    ════════════════════════════════════ */
    .main-content { margin-left: var(--sw); }

    /* ════════════════════════════════════
       HERO
    ════════════════════════════════════ */
    .hero {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 40px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(124,58,237,0.07) 0%, transparent 65%);
      top: -200px; right: -150px;
      border-radius: 50%;
      pointer-events: none;
    }

    .hero::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(14,165,233,0.05) 0%, transparent 65%);
      bottom: -100px; left: -80px;
      border-radius: 50%;
      pointer-events: none;
    }

    .hero-container {
      max-width: 820px; width: 100%;
      position: relative; z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 44px;
      animation: riseUp 0.7s var(--ease) both;
    }

    @keyframes riseUp {
      from { opacity: 0; transform: translateY(36px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ════════════════════════════════════
       PROFILE CARD
    ════════════════════════════════════ */
    .profile-card {
      background: linear-gradient(145deg, rgba(124,58,237,0.05), rgba(14,165,233,0.05));
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 26px;
      width: 100%; max-width: 460px;
      backdrop-filter: blur(12px);
      text-align: left;
    }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }

    .profile-avatar {
      width: 70px; height: 70px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--a1), var(--a2));
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
      position: relative;
      box-shadow: 0 8px 28px rgba(124,58,237,0.25);
    }

    .profile-avatar img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 12px;
    }

    .avatar-emoji {
      font-size: 26px;
      line-height: 1;
    }

    .profile-info h2 {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 2px;
      letter-spacing: -0.3px;
    }

    .profile-role {
      font-size: 11.5px;
      color: var(--a2);
      font-weight: 600;
      margin-bottom: 6px;
      letter-spacing: 0.2px;
    }

    .profile-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--tm);
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--tm);
      flex-shrink: 0;
      position: relative;
      transition: background 0.5s ease;
    }

    .status-dot.online  { background: #22c55e; }
    .status-dot.idle    { background: #f59e0b; }
    .status-dot.dnd     { background: #ef4444; }
    .status-dot.offline { background: #555560; }

    .status-dot.online::after {
      content: '';
      position: absolute; inset: -3px;
      border-radius: 50%;
      background: rgba(34,197,94,0.25);
      animation: onlinePing 2.2s ease-in-out infinite;
    }

    @keyframes onlinePing {
      0%,100% { transform: scale(1); opacity: 0.7; }
      50%      { transform: scale(1.7); opacity: 0; }
    }

    /* Discord Activity bar */
    .discord-bar {
      display: none;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      padding: 8px 11px;
      background: rgba(88,101,242,0.07);
      border: 1px solid rgba(88,101,242,0.15);
      border-radius: 9px;
      font-size: 11px;
      color: var(--ts);
    }

    .discord-bar.show { display: flex; }
    .discord-bar i { color: #5865f2; font-size: 14px; flex-shrink: 0; }
    .discord-bar-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Social Embeds */
    .social-embeds {
      display: flex;
      flex-direction: column;
      gap: 7px;
      padding: 16px 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin: 16px 0;
    }

    .social-embed {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 9px 11px;
      border-radius: 9px;
      background: rgba(255,255,255,0.02);
      border: 1px solid transparent;
      transition: all 0.2s var(--ease);
      color: var(--ts);
      text-decoration: none;
    }

    .social-embed:hover {
      background: rgba(124,58,237,0.07);
      border-color: rgba(124,58,237,0.18);
      color: var(--a1);
      transform: translateX(3px);
    }

    .social-embed i { font-size: 16px; flex-shrink: 0; }
    .se-label { font-size: 12px; font-weight: 600; color: var(--tp); display: block; }
    .se-handle { font-size: 11px; color: var(--tm); }

    .profile-bio {
      font-size: 13px;
      color: var(--ts);
      line-height: 1.75;
      padding: 12px 0;
    }

    .badges {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
    }

    .badge {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 10.5px;
      font-weight: 600;
      background: rgba(124,58,237,0.09);
      color: var(--a1);
      border: 1px solid rgba(124,58,237,0.2);
    }

    /* Hero title */
    .hero-title {
      font-size: 50px;
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -1px;
      background: linear-gradient(130deg, var(--tp) 40%, var(--a2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      max-width: 660px;
    }

    .hero-sub {
      font-size: 15.5px;
      color: var(--ts);
      line-height: 1.85;
      max-width: 520px;
      margin: 0 auto;
    }

    .btn-group {
      display: flex; gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 11px 26px;
      border-radius: 10px;
      font-size: 13.5px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.2s var(--ease);
      display: inline-flex; align-items: center; gap: 7px;
      text-decoration: none;
      font-family: 'Geist', sans-serif;
      letter-spacing: 0.1px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--a1), var(--a2));
      color: #fff;
      box-shadow: 0 6px 20px rgba(124,58,237,0.28);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(124,58,237,0.4);
    }

    .btn-secondary {
      background: var(--bg2);
      color: var(--tp);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--bg3);
      border-color: rgba(124,58,237,0.25);
      color: var(--a1);
    }

    /* ════════════════════════════════════
       SECTIONS
    ════════════════════════════════════ */
    .section { padding: 100px 48px; }
    .section.alt { background: var(--bg2); }
    .section-container { max-width: 1080px; margin: 0 auto; }

    .section-label {
      font-size: 10.5px;
      font-weight: 700;
      color: var(--a1);
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .section-title {
      font-size: 36px;
      font-weight: 800;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    .section-desc {
      font-size: 15px;
      color: var(--ts);
      margin-bottom: 52px;
      max-width: 520px;
      line-height: 1.7;
    }

    /* ════════════════════════════════════
       PROJECT CARDS
    ════════════════════════════════════ */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .project-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.25s var(--ease);
      display: flex;
      flex-direction: column;
      cursor: pointer;
    }

    .project-card:hover {
      border-color: rgba(124,58,237,0.35);
      box-shadow: 0 10px 36px rgba(124,58,237,0.1);
      transform: translateY(-4px);
    }

    .proj-preview {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      overflow: hidden;
      background: var(--bg3);
    }

    .proj-thumb-fallback {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, rgba(124,58,237,0.12), rgba(14,165,233,0.12));
      font-size: 36px;
      color: rgba(255,255,255,0.2);
      z-index: 0;
    }

    .proj-thumb {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 1;
      transition: transform 0.4s var(--ease);
      display: block;
    }

    .project-card:hover .proj-thumb { transform: scale(1.05); }

    .proj-play-overlay {
      position: absolute; inset: 0;
      z-index: 2;
      background: rgba(0,0,0,0);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.25s ease;
    }

    .project-card:hover .proj-play-overlay {
      background: rgba(0,0,0,0.38);
    }

    .play-circle {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(6px);
      border: 1.5px solid rgba(255,255,255,0.25);
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      font-size: 20px;
      opacity: 0;
      transform: scale(0.8);
      transition: all 0.2s var(--ease);
    }

    .project-card:hover .play-circle {
      opacity: 1;
      transform: scale(1);
    }

    .play-circle:hover {
      background: rgba(124,58,237,0.55);
      border-color: var(--a1);
      transform: scale(1.08) !important;
    }

    .proj-content {
      padding: 18px 20px 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .proj-title {
      font-size: 15.5px;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: -0.2px;
    }

    .proj-desc {
      font-size: 13px;
      color: var(--ts);
      margin-bottom: 14px;
      flex: 1;
      line-height: 1.65;
    }

    .proj-tags {
      display: flex; gap: 6px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .tag {
      padding: 3px 9px;
      border-radius: 5px;
      font-size: 10px;
      font-weight: 600;
      background: rgba(124,58,237,0.08);
      color: var(--a1);
      border: 1px solid rgba(124,58,237,0.18);
    }

    .proj-link {
      color: var(--a2);
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: all 0.2s ease;
      width: fit-content;
    }

    .proj-link:hover { color: var(--a1); gap: 8px; }

    /* ════════════════════════════════════
       VIDEO MODAL
    ════════════════════════════════════ */
    .v-modal {
      position: fixed; inset: 0;
      z-index: 9000;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.22s ease;
    }

    .v-modal.open {
      opacity: 1;
      pointer-events: all;
    }

    .v-backdrop {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(10px);
      cursor: pointer;
    }

    .v-box {
      position: relative; z-index: 1;
      width: 100%; max-width: 880px;
      background: var(--bg2);
      border: 1px solid rgba(124,58,237,0.18);
      border-radius: 18px;
      overflow: hidden;
      transform: scale(0.93) translateY(10px);
      transition: transform 0.25s cubic-bezier(0.34, 1.4, 0.64, 1);
      box-shadow: 0 40px 100px rgba(0,0,0,0.7);
    }

    .v-modal.open .v-box {
      transform: scale(1) translateY(0);
    }

    .v-header {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
    }

    .v-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--tp);
    }

    .v-controls { display: flex; gap: 7px; }

    .v-btn {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg2);
      color: var(--ts);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      transition: all 0.18s ease;
    }

    .v-btn:hover {
      background: var(--bgh);
      color: var(--tp);
      border-color: rgba(124,58,237,0.25);
    }

    .v-btn.muted {
      color: var(--a3);
      border-color: rgba(244,114,182,0.25);
      background: rgba(244,114,182,0.05);
    }

    .v-player {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
    }

    .v-player iframe {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      border: none;
      display: block;
    }

    /* ════════════════════════════════════
       SKILLS
    ════════════════════════════════════ */
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 13px;
    }

    .skill-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      transition: all 0.2s var(--ease);
    }

    .skill-card:hover {
      border-color: rgba(124,58,237,0.3);
      background: rgba(124,58,237,0.05);
      transform: translateY(-3px);
    }

    .skill-icon {
      font-size: 26px;
      margin-bottom: 9px;
      color: var(--a1);
    }

    .skill-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--tp);
    }

    /* ════════════════════════════════════
       CONTACT
    ════════════════════════════════════ */
    .contact-wrap { max-width: 520px; margin: 0 auto; }

    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 44px;
    }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 7px; }

    .form-group label {
      font-size: 11.5px;
      font-weight: 600;
      color: var(--ts);
      letter-spacing: 0.3px;
    }

    .form-group input,
    .form-group textarea {
      padding: 10px 13px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg2);
      color: var(--tp);
      font-family: 'Geist', sans-serif;
      font-size: 13.5px;
      transition: all 0.2s var(--ease);
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder { color: var(--tm); }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: rgba(124,58,237,0.5);
      background: var(--bg3);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.07);
    }

    .form-group textarea { resize: vertical; min-height: 110px; }

    .form-submit {
      padding: 11px 26px;
      background: linear-gradient(135deg, var(--a1), var(--a2));
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Geist', sans-serif;
      font-weight: 600;
      font-size: 13.5px;
      cursor: pointer;
      transition: all 0.2s var(--ease);
      display: inline-flex; align-items: center; gap: 7px;
      align-self: flex-start;
      box-shadow: 0 5px 18px rgba(124,58,237,0.25);
    }

    .form-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 9px 26px rgba(124,58,237,0.38);
    }

    /* ════════════════════════════════════
       FOOTER
    ════════════════════════════════════ */
    footer {
      padding: 28px 48px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 12.5px;
      color: var(--tm);
    }

    footer a { color: var(--a1); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* ════════════════════════════════════
       RESPONSIVE
    ════════════════════════════════════ */
    @media (max-width: 800px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .mob-overlay { display: block; }
      .hamburger { display: flex; }
      .main-content { margin-left: 0; }

      .hero { padding: 80px 20px 60px; min-height: auto; }
      .hero-title { font-size: 32px; letter-spacing: -0.5px; }
      .hero-sub { font-size: 14px; }

      .section { padding: 70px 20px; }
      .section-title { font-size: 28px; }

      .projects-grid { grid-template-columns: 1fr; }
      .skills-grid { grid-template-columns: repeat(2, 1fr); }
      .form-row { grid-template-columns: 1fr; }

      .btn-group { flex-direction: column; }
      .btn { width: 100%; justify-content: center; }

      footer { padding: 24px 20px; }
    }

    @media (max-width: 420px) {
      .skills-grid { grid-template-columns: repeat(2, 1fr); }
      .v-modal { padding: 10px; }
    }
  </style>
</head>
<body>

  <!-- ── Hamburger (mobile) ── -->
  <button class="hamburger" id="hamburger" aria-label="Toggle navigation">
    <span></span><span></span><span></span>
  </button>

  <!-- ── Mobile overlay ── -->
  <div class="mob-overlay" id="mobOverlay"></div>

  <!-- ════════════════════════════════════
       SIDEBAR
  ════════════════════════════════════ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <span class="sidebar-logo"  id="sidebarLogo"></span>
      <span class="sidebar-tagline" id="sidebarTagline"></span>
    </div>

    <nav class="sidebar-nav">
      <a href="#home"     class="nav-item active" data-section="home">
        <i class="ph ph-house-simple"></i><span>Home</span>
      </a>
      <a href="#projects" class="nav-item" data-section="projects">
        <i class="ph ph-film-reel"></i><span>Work</span>
      </a>
      <a href="#skills"   class="nav-item" data-section="skills">
        <i class="ph ph-magic-wand"></i><span>Skills</span>
      </a>
      <a href="#contact"  class="nav-item" data-section="contact">
        <i class="ph ph-envelope-simple"></i><span>Contact</span>
      </a>
    </nav>

    <!-- Sidebar footer social icons — populated by JS -->
    <div class="sidebar-footer" id="sidebarFooter"></div>
  </aside>

  <!-- ════════════════════════════════════
       MAIN CONTENT
  ════════════════════════════════════ -->
  <main class="main-content">

    <!-- ── Hero ── -->
    <section class="hero" id="home">
      <div class="hero-container">

        <!-- Profile Card -->
        <div class="profile-card">
          <div class="profile-header">
            <div class="profile-avatar" id="profileAvatar">
              <span class="avatar-emoji" id="avatarFallback"></span>
            </div>
            <div class="profile-info">
              <h2 id="profileName"></h2>
              <div class="profile-role" id="profileRole"></div>
              <div class="profile-status">
                <span class="status-dot offline" id="statusDot"></span>
                <span id="statusText">Available for projects</span>
              </div>
            </div>
          </div>

          <!-- Discord Activity (hidden until loaded) -->
          <div class="discord-bar" id="discordBar">
            <i class="ph ph-discord-logo"></i>
            <span class="discord-bar-text" id="discordBarText"></span>
          </div>

          <!-- Social embeds — populated by JS -->
          <div class="social-embeds" id="socialEmbeds"></div>

          <div class="profile-bio" id="profileBio"></div>

          <div class="badges" id="profileBadges"></div>
        </div>

        <h1 class="hero-title" id="heroTitle"></h1>
        <p  class="hero-sub"   id="heroSubtitle"></p>

        <div class="btn-group" id="heroBtns"></div>

      </div>
    </section>

    <!-- ── Projects ── -->
    <section class="section" id="projects">
      <div class="section-container">
        <div class="section-label">Portfolio</div>
        <h2 class="section-title">Selected Projects</h2>
        <p class="section-desc">A selection of recent work across various genres. Click any card to preview.</p>
        <div class="projects-grid" id="projectsGrid"></div>
      </div>
    </section>

    <!-- ── Skills ── -->
    <section class="section alt" id="skills">
      <div class="section-container">
        <div class="section-label">Expertise</div>
        <h2 class="section-title">Tools &amp; Skills</h2>
        <p class="section-desc">Industry-leading software and techniques for professional video production.</p>
        <div class="skills-grid" id="skillsGrid"></div>
      </div>
    </section>

    <!-- ── Contact ── -->
    <section class="section" id="contact">
      <div class="section-container">
        <div class="contact-wrap">
          <div class="section-label">Contact</div>
          <h2 class="section-title" id="contactTitle"></h2>
          <p  class="section-desc"  id="contactDesc"></p>

          <div class="btn-group" id="contactBtns" style="margin-top:20px;"></div>

          <form class="contact-form" id="contactForm">
            <div class="form-row">
              <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" placeholder="John Doe" required>
              </div>
              <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="john@example.com" required>
              </div>
            </div>
            <div class="form-group">
              <label for="subject">Subject</label>
              <input type="text" id="subject" placeholder="Project inquiry..." required>
            </div>
            <div class="form-group">
              <label for="message">Message</label>
              <textarea id="message" placeholder="Tell me about your project..." required></textarea>
            </div>
            <button type="submit" class="form-submit" id="submitBtn">
              <i class="ph ph-paper-plane-tilt"></i>
              Send Message
            </button>
          </form>
        </div>
      </div>
    </section>

    <!-- ── Footer ── -->
    <footer id="siteFooter"></footer>

  </main>

  <!-- ════════════════════════════════════
       VIDEO MODAL
  ════════════════════════════════════ -->
  <div class="v-modal" id="vModal" role="dialog" aria-modal="true">
    <div class="v-backdrop" id="vBackdrop"></div>
    <div class="v-box">
      <div class="v-header">
        <span class="v-title" id="vTitle">Preview</span>
        <div class="v-controls">
          <button class="v-btn" id="muteBtn" title="Toggle Mute">
            <i class="ph ph-speaker-high" id="muteIcon"></i>
          </button>
          <button class="v-btn" id="closeBtn" title="Close (Esc)">
            <i class="ph ph-x"></i>
          </button>
        </div>
      </div>
      <div class="v-player">
        <iframe id="vFrame" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
      </div>
    </div>
  </div>

  <!-- Load config first, then the renderer -->
  <script src="config.js"></script>

  <script>
    /* ══════════════════════════════════════════════════════════
       CONFIG RENDERER — reads CONFIG from config.js and builds
       the entire page. Do not edit below unless you know what
       you're doing.
    ══════════════════════════════════════════════════════════ */

    (function applyConfig() {
      const C = CONFIG;

      /* ── Theme colors ── */
      const r = document.documentElement.style;
      r.setProperty('--a1', C.theme.accentPrimary);
      r.setProperty('--a2', C.theme.accentSecondary);
      r.setProperty('--a3', C.theme.accentTertiary);

      /* ── Meta ── */
      document.title = C.meta.siteTitle;
      document.getElementById('pageTitle').textContent   = C.meta.siteTitle;
      document.getElementById('metaDesc').content        = C.meta.description;
      document.getElementById('metaAuthor').content      = C.meta.author;
      document.getElementById('ogTitle').content         = C.meta.ogTitle;
      document.getElementById('ogDesc').content          = C.meta.ogDescription;
      if (C.meta.ogImage) document.getElementById('ogImage').content = C.meta.ogImage;

      /* ── Sidebar brand ── */
      document.getElementById('sidebarLogo').textContent    = C.identity.name;
      document.getElementById('sidebarTagline').textContent = C.identity.tagline;

      /* ── Sidebar footer social icons ── */
      const socialIconMap = {
        youtube:   { icon: 'ph-youtube-logo',   label: 'YouTube'   },
        instagram: { icon: 'ph-instagram-logo', label: 'Instagram' },
        twitter:   { icon: 'ph-twitter-logo',   label: 'Twitter'   },
        tiktok:    { icon: 'ph-tiktok-logo',     label: 'TikTok'    },
      };

      const sidebarFooter = document.getElementById('sidebarFooter');
      Object.entries(C.socials).forEach(([key, val]) => {
        if (!val.url) return;
        const map = socialIconMap[key] || { icon: 'ph-link', label: key };
        sidebarFooter.insertAdjacentHTML('beforeend',
          `<a href="${val.url}" target="_blank" class="s-icon" title="${map.label}">
            <i class="ph ${map.icon}"></i>
          </a>`
        );
      });
      // Discord server icon
      if (C.discord.serverUrl) {
        sidebarFooter.insertAdjacentHTML('beforeend',
          `<a href="${C.discord.serverUrl}" target="_blank" class="s-icon" title="Discord">
            <i class="ph ph-discord-logo"></i>
          </a>`
        );
      }

      /* ── Profile card ── */
      document.getElementById('avatarFallback').textContent = C.identity.avatarFallback;
      document.getElementById('profileName').textContent    = C.identity.name;
      document.getElementById('profileRole').textContent    = C.identity.role;
      document.getElementById('profileBio').textContent     = C.identity.bio;

      // Social embeds inside profile card
      const socialEmbedsEl = document.getElementById('socialEmbeds');
      Object.entries(C.socials).forEach(([key, val]) => {
        if (!val.url) return;
        const map = socialIconMap[key] || { icon: 'ph-link', label: key };
        const label = map.label.charAt(0).toUpperCase() + map.label.slice(1);
        socialEmbedsEl.insertAdjacentHTML('beforeend',
          `<a href="${val.url}" target="_blank" class="social-embed">
            <i class="ph ${map.icon}"></i>
            <div>
              <span class="se-label">${label}</span>
              <span class="se-handle">${val.handle || ''}</span>
            </div>
          </a>`
        );
      });
      // Discord server embed
      if (C.discord.serverUrl) {
        socialEmbedsEl.insertAdjacentHTML('beforeend',
          `<a href="${C.discord.serverUrl}" target="_blank" class="social-embed">
            <i class="ph ph-discord-logo"></i>
            <div>
              <span class="se-label">Discord</span>
              <span class="se-handle">${C.discord.serverLabel}</span>
            </div>
          </a>`
        );
      }

      // Badges
      const badgesEl = document.getElementById('profileBadges');
      C.identity.badges.forEach(b => {
        badgesEl.insertAdjacentHTML('beforeend', `<span class="badge">${b}</span>`);
      });

      /* ── Hero ── */
      document.getElementById('heroTitle').innerHTML    = C.hero.title;
      document.getElementById('heroSubtitle').textContent = C.hero.subtitle;

      const heroBtns = document.getElementById('heroBtns');
      heroBtns.insertAdjacentHTML('beforeend',
        `<a href="${C.hero.primaryCta.href}" class="btn btn-primary">
          <i class="ph ${C.hero.primaryCta.icon}"></i>${C.hero.primaryCta.text}
        </a>
        <a href="${C.hero.secondaryCta.href}" class="btn btn-secondary">
          <i class="ph ${C.hero.secondaryCta.icon}"></i>${C.hero.secondaryCta.text}
        </a>`
      );

      /* ── Projects ── */
      const grid = document.getElementById('projectsGrid');
      C.projects.forEach(p => {
        const thumb = p.customThumb
          ? p.customThumb
          : `https://img.youtube.com/vi/${p.youtubeId}/maxresdefault.jpg`;
        const fallbackThumb = p.customThumb
          ? p.customThumb
          : `https://img.youtube.com/vi/${p.youtubeId}/hqdefault.jpg`;
        const tagsHTML = p.tags.map(t => `<span class="tag">${t}</span>`).join('');
        grid.insertAdjacentHTML('beforeend',
          `<div class="project-card" data-vid="${p.youtubeId}" data-title="${p.title}">
            <div class="proj-preview">
              <div class="proj-thumb-fallback">${p.thumbFallback}</div>
              <img class="proj-thumb"
                src="${thumb}"
                alt="${p.title}"
                onerror="this.src='${fallbackThumb}';this.onerror=null;">
              <div class="proj-play-overlay">
                <div class="play-circle"><i class="ph ph-play ph-fill"></i></div>
              </div>
            </div>
            <div class="proj-content">
              <h3 class="proj-title">${p.title}</h3>
              <p class="proj-desc">${p.description}</p>
              <div class="proj-tags">${tagsHTML}</div>
              <a href="${p.linkUrl}" target="_blank" class="proj-link" onclick="event.stopPropagation()">
                <i class="ph ${p.linkIcon}"></i>${p.linkLabel}
              </a>
            </div>
          </div>`
        );
      });

      /* ── Skills ── */
      const skillsGrid = document.getElementById('skillsGrid');
      C.skills.forEach(s => {
        skillsGrid.insertAdjacentHTML('beforeend',
          `<div class="skill-card">
            <div class="skill-icon"><i class="ph ${s.icon}"></i></div>
            <div class="skill-name">${s.name}</div>
          </div>`
        );
      });

      /* ── Contact section ── */
      document.getElementById('contactTitle').textContent = C.contact.sectionTitle;
      document.getElementById('contactDesc').textContent  = C.contact.sectionDesc;

      const contactBtns = document.getElementById('contactBtns');
      contactBtns.insertAdjacentHTML('beforeend',
        `<a href="mailto:${C.contact.email}" class="btn btn-primary">
          <i class="ph ph-envelope-simple"></i>Email Me
        </a>
        <a href="${C.discord.profileUrl}" target="_blank" class="btn btn-secondary">
          <i class="ph ph-discord-logo"></i>Discord
        </a>`
      );
      if (C.socials.instagram && C.socials.instagram.url) {
        contactBtns.insertAdjacentHTML('beforeend',
          `<a href="${C.socials.instagram.url}" target="_blank" class="btn btn-secondary">
            <i class="ph ph-instagram-logo"></i>Instagram
          </a>`
        );
      }

      // Form action
      if (C.contact.formAction) {
        document.getElementById('contactForm').setAttribute('action', C.contact.formAction);
        document.getElementById('contactForm').setAttribute('method', 'POST');
      }

      /* ── Footer ── */
      document.getElementById('siteFooter').innerHTML =
        `Made with ♥ by <a href="${C.footer.authorUrl}">${C.footer.authorName}</a>
         &nbsp;·&nbsp; ${C.footer.credit} · © ${C.footer.year}`;

    })();


    /* ══════════════════════════════════════════════════════════
       DISCORD PROFILE & STATUS (Lanyard)
    ══════════════════════════════════════════════════════════ */
    async function loadProfile() {
      const localPath = CONFIG.identity.localAvatar;
      if (localPath) {
        const testImg = new Image();
        testImg.onload  = () => applyAvatar(localPath);
        testImg.onerror = () => fetchDiscord();
        testImg.src = localPath;
      } else {
        fetchDiscord();
      }
    }

    async function fetchDiscord() {
      const uid = CONFIG.discord.userId;
      if (!uid || uid === 'YOUR_DISCORD_USER_ID') {
        setStatus('offline', 'Available for projects');
        return;
      }
      try {
        const r = await fetch(`https://api.lanyard.rest/v1/users/${uid}`);
        const d = await r.json();
        if (!d.success) { setStatus('offline', 'Available for projects'); return; }

        const { discord_user, discord_status, activities, spotify } = d.data;

        if (discord_user.avatar) {
          applyAvatar(`https://cdn.discordapp.com/avatars/${discord_user.id}/${discord_user.avatar}.png?size=256`);
        }

        const labels = { online: 'Online on Discord', idle: 'Idle', dnd: 'Do Not Disturb', offline: 'Offline' };
        setStatus(discord_status, labels[discord_status] || 'Offline');

        if (spotify) {
          showActivity(`Listening to ${spotify.song} — ${spotify.artist}`);
        } else if (activities && activities.length > 0) {
          const a = activities.find(x => x.type !== 4);
          if (a) showActivity(a.details ? `${a.name}: ${a.details}` : a.name);
        }
      } catch (e) {
        setStatus('offline', 'Available for projects');
      }
    }

    function applyAvatar(src) {
      const avatar = document.getElementById('profileAvatar');
      const img = document.createElement('img');
      img.alt = CONFIG.identity.name;
      img.onload = () => {
        document.getElementById('avatarFallback').style.display = 'none';
        avatar.appendChild(img);
      };
      img.src = src;
    }

    function setStatus(cls, text) {
      document.getElementById('statusDot').className  = `status-dot ${cls}`;
      document.getElementById('statusText').textContent = text;
    }

    function showActivity(text) {
      document.getElementById('discordBarText').textContent = text;
      document.getElementById('discordBar').classList.add('show');
    }

    loadProfile();


    /* ══════════════════════════════════════════════════════════
       SIDEBAR TOGGLE
    ══════════════════════════════════════════════════════════ */
    const hamburger  = document.getElementById('hamburger');
    const sidebar    = document.getElementById('sidebar');
    const mobOverlay = document.getElementById('mobOverlay');

    function openSidebar()  {
      sidebar.classList.add('open');
      mobOverlay.classList.add('show');
      hamburger.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeSidebar() {
      sidebar.classList.remove('open');
      mobOverlay.classList.remove('show');
      hamburger.classList.remove('open');
      document.body.style.overflow = '';
    }

    hamburger.addEventListener('click', () =>
      sidebar.classList.contains('open') ? closeSidebar() : openSidebar()
    );
    mobOverlay.addEventListener('click', closeSidebar);
    document.querySelectorAll('.nav-item').forEach(el => {
      el.addEventListener('click', () => { if (window.innerWidth <= 800) closeSidebar(); });
    });


    /* ══════════════════════════════════════════════════════════
       ACTIVE SECTION HIGHLIGHT
    ══════════════════════════════════════════════════════════ */
    const navItems = document.querySelectorAll('.nav-item[data-section]');

    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          navItems.forEach(el => {
            el.classList.toggle('active', el.dataset.section === entry.target.id);
          });
        }
      });
    }, { threshold: 0.35 });

    document.querySelectorAll('section[id]').forEach(s => observer.observe(s));


    /* ══════════════════════════════════════════════════════════
       VIDEO MODAL
    ══════════════════════════════════════════════════════════ */
    const vModal   = document.getElementById('vModal');
    const vFrame   = document.getElementById('vFrame');
    const vTitle   = document.getElementById('vTitle');
    const muteBtn  = document.getElementById('muteBtn');
    const muteIcon = document.getElementById('muteIcon');
    const closeBtn = document.getElementById('closeBtn');
    const vBackdrop= document.getElementById('vBackdrop');

    let muted = false;

    function openVideo(videoId, title) {
      vTitle.textContent = title || 'Preview';
      vFrame.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&enablejsapi=1&rel=0`;
      muted = false;
      muteIcon.className = 'ph ph-speaker-high';
      muteBtn.classList.remove('muted');
      vModal.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeVideo() {
      vModal.classList.remove('open');
      setTimeout(() => { vFrame.src = ''; }, 220);
      document.body.style.overflow = '';
    }

    function toggleMute() {
      muted = !muted;
      const msg = muted
        ? '{"event":"command","func":"mute","args":""}'
        : '{"event":"command","func":"unMute","args":""}';
      try { vFrame.contentWindow.postMessage(msg, '*'); } catch(e) {}
      muteIcon.className = muted ? 'ph ph-speaker-slash' : 'ph ph-speaker-high';
      muteBtn.classList.toggle('muted', muted);
    }

    document.getElementById('projectsGrid').addEventListener('click', e => {
      const card = e.target.closest('.project-card');
      if (!card || e.target.closest('.proj-link')) return;
      const vid = card.dataset.vid;
      if (vid) openVideo(vid, card.dataset.title);
    });

    muteBtn.addEventListener('click', toggleMute);
    closeBtn.addEventListener('click', closeVideo);
    vBackdrop.addEventListener('click', closeVideo);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeVideo(); });


    /* ══════════════════════════════════════════════════════════
       SMOOTH SCROLL
    ══════════════════════════════════════════════════════════ */
    document.querySelectorAll('a[href^="#"]').forEach(a => {
      a.addEventListener('click', function(e) {
        const href = this.getAttribute('href');
        if (!href || href === '#') return;
        e.preventDefault();
        const target = document.querySelector(href);
        if (target) target.scrollIntoView({ behavior: 'smooth' });
      });
    });


    /* ══════════════════════════════════════════════════════════
       CONTACT FORM
    ══════════════════════════════════════════════════════════ */
    document.getElementById('contactForm').addEventListener('submit', function(e) {
      if (!CONFIG.contact.formAction) e.preventDefault(); // demo mode
      const btn = document.getElementById('submitBtn');
      const original = btn.innerHTML;
      btn.innerHTML = '<i class="ph ph-check-circle"></i> Sent!';
      btn.style.opacity = '0.8';
      setTimeout(() => { btn.innerHTML = original; btn.style.opacity = '1'; }, 3000);
    });
  </script>
</body>
</html>
